<div class="sm-overlay" id="settingsOverlay" role="dialog"
     aria-modal="true" aria-labelledby="settingsTitle">

  <div class="sm-modal" id="settingsModal">

    <!-- Header -->
    <div class="sm-header">
      <div class="sm-header-left">
        <div class="sm-icon-wrap">
          <i class="fa-solid fa-circle-user"></i>
        </div>
        <div>
          <h2 id="settingsTitle">Edit Your Profile</h2>
          <p>Update your personal information and preferences.</p>
        </div>
      </div>
      <button class="sm-close" id="settingsClose" aria-label="Close">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <!-- Body -->
    <div class="sm-body">

      <!-- Left col: form -->
      <div class="sm-form-col">

        <div class="sm-row">
          <div class="sm-field">
            <label for="sm-name">Full Name</label>
            <div class="sm-input-wrap">
              <i class="fa-solid fa-user sm-input-icon"></i>
              <input type="text" id="sm-name" class="sm-input"
                     placeholder="e.g. Anannya Rahman" />
            </div>
          </div>
          <div class="sm-field">
            <label for="sm-email">E-mail</label>
            <div class="sm-input-wrap">
              <i class="fa-solid fa-envelope sm-input-icon"></i>
              <input type="email" id="sm-email" class="sm-input"
                     placeholder="you@university.edu" />
            </div>
          </div>
        </div>

        <div class="sm-row">
          <div class="sm-field">
            <label for="sm-phone">Phone Number</label>
            <div class="sm-input-wrap">
              <i class="fa-solid fa-phone sm-input-icon"></i>
              <input type="tel" id="sm-phone" class="sm-input"
                     placeholder="+880 1XXX XXXXXX" />
            </div>
          </div>
          <div class="sm-field">
            <label for="sm-role">Position / Role</label>
            <div class="sm-input-wrap">
              <i class="fa-solid fa-id-badge sm-input-icon"></i>
              <select id="sm-role" class="sm-input sm-select">
                <option value="student" selected>Student</option>
                <option value="faculty">Faculty</option>
                <option value="ta">Teaching Assistant</option>
                <option value="admin">Administrator</option>
              </select>
            </div>
          </div>
        </div>

        <div class="sm-field sm-field-full">
          <label for="sm-institute">Institute Name</label>
          <div class="sm-input-wrap">
            <i class="fa-solid fa-building-columns sm-input-icon"></i>
            <input type="text" id="sm-institute" class="sm-input"
                   placeholder="e.g. BRAC University" />
          </div>
        </div>

        <div class="sm-field sm-field-full">
          <label for="sm-department">Department</label>
          <div class="sm-input-wrap">
            <i class="fa-solid fa-sitemap sm-input-icon"></i>
            <input type="text" id="sm-department" class="sm-input"
                   placeholder="e.g. Computer Science & Engineering" />
          </div>
        </div>

      </div><!-- /sm-form-col -->

      <!-- Right col: avatar -->
      <div class="sm-avatar-col">
        <div class="sm-avatar-ring" id="smAvatarRing">
          <div class="sm-avatar-preview" id="smAvatarPreview">
            <span class="sm-avatar-initials" id="smAvatarInitials"></span>
            <img id="smAvatarImg" src="" alt="" />
          </div>
          <div class="sm-avatar-overlay" id="smAvatarOverlay"
               title="Upload photo">
            <i class="fa-solid fa-camera"></i>
          </div>
        </div>
        <input type="file" id="smAvatarFile" accept="image/*"
               style="display:none" />
        <span class="sm-avatar-hint">Click to upload photo</span>
        <span class="sm-avatar-hint sm-avatar-hint-sm">
          JPG, PNG · max 2 MB
        </span>

        <!-- Divider -->
        <div class="sm-avatar-sep"></div>

        <!-- Theme toggle (bonus) -->
        <div class="sm-pref-row">
          <span class="sm-pref-label">
            <i class="fa-solid fa-moon"></i> Dark Mode
          </span>
          <label class="sm-toggle">
            <input type="checkbox" id="smDarkMode" />
            <span class="sm-toggle-track"></span>
          </label>
        </div>

        <div class="sm-pref-row">
          <span class="sm-pref-label">
            <i class="fa-solid fa-bell"></i> Notifications
          </span>
          <label class="sm-toggle">
            <input type="checkbox" id="smNotifs" checked />
            <span class="sm-toggle-track"></span>
          </label>
        </div>

      </div><!-- /sm-avatar-col -->

    </div><!-- /sm-body -->

    <!-- Footer -->
    <div class="sm-footer">
      <button class="sm-btn-ghost sm-danger-link" id="smDeleteAccount">
        <i class="fa-solid fa-triangle-exclamation"></i> Delete Account
      </button>
      <div class="sm-footer-right">
        <button class="sm-btn-ghost" id="settingsCancel">Cancel</button>
        <button class="sm-btn-primary" id="smSave">
          <i class="fa-solid fa-floppy-disk"></i> Save Changes
        </button>
      </div>
    </div>

  </div><!-- /sm-modal -->
</div><!-- /sm-overlay -->
