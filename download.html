<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Download History</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="download.css">
</head>
<body>

  <main class="main">

    <!-- Hero -->
    <section class="hero">
      <div class="hero__copy">
        <h1 class="hero__title">Downloaded <span class="color_change">Files</span></h1>
        <p class="hero__desc">All exam papers and question sets you've exported are stored here.<br> Re-download or delete at any time.</p>
      </div>
      <div class="hero__stats">
        <div class="stat-card">
          <span class="stat-value" id="stat-total">0</span>
          <span class="stat-label">Total Files</span>
        </div>
    
        <div class="stat-card">
          <span class="stat-value" id="stat-recent">—</span>
          <span class="stat-label">Last Download</span>
        </div>
      </div>
      <div class="hero__orb hero__orb--1"></div>
      <div class="hero__orb hero__orb--2"></div>
    </section>

    <!-- Controls -->
    <section class="controls">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 20 20" fill="none">
          <circle cx="8.5" cy="8.5" r="5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M13 13l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input type="text" id="search-input" class="search-input" placeholder="Search downloaded files…" autocomplete="off"/>
      </div>
      <div class="filter-group">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="pdf">PDF</button>
        <button class="filter-btn" data-filter="docx">DOCX</button>
      </div>
      <button class="clear-btn" id="clear-all-btn" title="Clear all history">
        <svg viewBox="0 0 20 20" fill="none">
          <path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Clear All
      </button>
    </section>

    <!-- File List -->
    <section class="file-section">
      <div class="file-list" id="file-list"></div>
      <div class="empty-state hidden" id="empty-state">
        <div class="empty-icon">
          <svg viewBox="0 0 64 64" fill="none">
            <rect x="12" y="8" width="40" height="48" rx="4" stroke="currentColor" stroke-width="2"/>
            <path d="M20 20h24M20 28h24M20 36h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <circle cx="44" cy="44" r="10" fill="var(--bg-main)" stroke="currentColor" stroke-width="2"/>
            <path d="M40 44h8M44 40v8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <p class="empty-title">No files found</p>
        <p class="empty-sub">Try a different search term or filter.</p>
      </div>
    </section>

  </main>

  <div class="toast" id="toast"></div>
  <script src="download.js"></script>
</body>
</html>
