<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Download History</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<link rel="stylesheet" href="../css/sidebar.css">
<link rel="stylesheet" href="../css/main_dashboard.css">
<link rel="stylesheet" href="../css/settings_modal.css">
<link rel="stylesheet" href="../css/download.css">
</head>
<body>

  <div id="sidebar-container"></div>
  <div id="settings-container"></div>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

  <main class="main">

    <!-- ── Hero ── -->
    <section class="hero">
      <div class="hero__copy">
        <h1 class="hero__title">Downloaded <span class="color_change">Files</span></h1>
        <p class="hero__desc">
          All exam papers and question sets you've exported are stored here.<br>
          Re-download or delete at any time.
        </p>
      </div>
      <div class="hero__stats">
        <div class="stat-card">
          <span class="stat-value" id="stat-total">0</span>
          <span class="stat-label">Total Files</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="stat-recent">—</span>
          <span class="stat-label">Last Download</span>
        </div>
      </div>
      <div class="hero__orb hero__orb--1"></div>
      <div class="hero__orb hero__orb--2"></div>
    </section>

    <!-- ── Controls ── -->
    <section class="controls">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 20 20" fill="none">
          <circle cx="8.5" cy="8.5" r="5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M13 13l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input type="text" id="search-input" class="search-input"
               placeholder="Search downloaded files…" autocomplete="off"/>
      </div>
      <div class="filter-group">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="pdf">PDF</button>
        <button class="filter-btn" data-filter="docx">DOCX</button>
        <button class="filter-btn" data-filter="xlsx">XLSX</button>
      </div>
      <button class="clear-btn" id="clear-all-btn" title="Clear all history">
        <svg viewBox="0 0 20 20" fill="none">
          <path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Clear All
      </button>
    </section>

    <!-- ── File List ── -->
    <section class="file-section">
      <div class="file-list" id="file-list"></div>

      <!-- Empty state -->
      <div class="empty-state hidden" id="empty-state">
        <div class="empty-icon">
          <svg viewBox="0 0 64 64" fill="none">
            <rect x="12" y="8" width="40" height="48" rx="4" stroke="currentColor" stroke-width="2"/>
            <path d="M20 20h24M20 28h24M20 36h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <circle cx="44" cy="44" r="10" fill="var(--bg-main)" stroke="currentColor" stroke-width="2"/>
            <path d="M40 44h8M44 40v8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <p class="empty-title">No files found</p>
        <p class="empty-sub">Try a different search term or filter.</p>
      </div>
    </section>

  </main>

  <!-- ── Toast ── -->
  <div class="toast" id="toast"></div>

  <!-- ════════════════════════════════════════════
       FILE CARD TEMPLATE
       JS clones this, fills in the data, appends
       to #file-list. Edit the markup here to
       change the card structure. Edit download.css
       to change how it looks.
  ═════════════════════════════════════════════ -->
  <template id="file-card-template">
    <div class="file-card">

      <!-- coloured left strip (colour set by type-pdf / type-docx / type-xlsx on parent) -->
      <div class="file-card__strip"></div>

      <!-- file type icon + label -->
      <div class="file-card__icon">
        <div class="file-type-badge">
          <!-- icon injected by JS based on type -->
          <svg class="badge-svg" viewBox="0 0 20 20" fill="none"></svg>
          <span class="badge-label"></span>
        </div>
      </div>

      <!-- file name + meta row -->
      <div class="file-card__body">
        <div class="file-card__name"></div>
        <div class="file-card__meta">
          <span class="meta-type"></span>
          <span class="meta-dot"></span>
          <span class="meta-size"></span>
          <span class="meta-dot"></span>
          <span class="meta-date"></span>
        </div>
      </div>

      <!-- action buttons -->
      <div class="file-card__actions">
        <button class="action-btn btn-download" title="Re-download">
          <svg viewBox="0 0 20 20" fill="none">
            <path d="M10 3v9m0 0L6.5 8.5M10 12l3.5-3.5"
                  stroke="currentColor" stroke-width="1.5"
                  stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M4 15h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="action-btn btn-copy" title="Copy name">
          <svg viewBox="0 0 20 20" fill="none">
            <rect x="7" y="7" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M7 13H5a1.5 1.5 0 01-1.5-1.5V5A1.5 1.5 0 015 3.5h6.5A1.5 1.5 0 0113 5v2"
                  stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="action-btn danger btn-remove" title="Remove">
          <svg viewBox="0 0 20 20" fill="none">
            <path d="M5 7h10M8 7V5h4v2M9 10v4M11 10v4"
                  stroke="currentColor" stroke-width="1.5"
                  stroke-linecap="round" stroke-linejoin="round"/>
            <rect x="5" y="7" width="10" height="9" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </button>
      </div>

    </div>
  </template>
<script>
fetch('sidebar.html')
  .then(res => res.text())
  .then(data => {

    document.getElementById('sidebar-container').innerHTML = data;

    const script = document.createElement('script');
    script.src = '../js/sidebar.js';
    document.body.appendChild(script);

  });
</script>
<script src="../js/download.js"></script>
</body>
</html>
