<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="signup_login.css" />
  <link rel="stylesheet" href="bg_animation.css" />
</head>
<body>

  <!-- ── BACKGROUND ANIMATED SHAPES (new) ── -->
  <div class="bg-shapes" aria-hidden="true">
    <div class="bg-shape bg-shape--1"></div>
    <div class="bg-shape bg-shape--2"></div>
    <div class="bg-shape bg-shape--3"></div>
    <div class="bg-shape bg-shape--4"></div>
    <div class="bg-shape bg-shape--5"></div>
    <div class="bg-shape bg-shape--6"></div>
  </div>

  <div class="card">

    <!-- Left Panel -->
    <div class="left-panel">
      <div class="shape teal-rect top-left"></div>
      <div class="shape orange-rect top-right"></div>
      <div class="shape teal-circle mid-left"></div>
      <div class="shape orange-rect bottom-left"></div>
      <div class="shape teal-circle bottom-right"></div>

      <div class="welcome-text">
        <h1>WELCOME</h1>
        <p>Create an account or login to explore our service</p>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="right-panel">

      <!-- Tab Toggle -->
      <div class="tab-group">
        <button class="tab active" id="tab-signup" onclick="switchTab('signup')">Sign up</button>
        <button class="tab" id="tab-login" onclick="switchTab('login')">Login</button>
      </div>

      <!-- Signup Form -->
      <form id="form-signup" class="auth-form" onsubmit="handleRegister(event)">
        <div class="row">
          <div class="field">
            <label>First Name</label>
            <input type="text" placeholder="John" />
          </div>
          <div class="field">
            <label>Last Name</label>
            <input type="text" placeholder="Jack" />
          </div>
        </div>

        <div class="field">
          <label>Email</label>
          <input type="email" placeholder="abc@gmail.com" />
        </div>

        <div class="field">
          <label>Password</label>
          <input type="password" placeholder="••••••••••••••••" />
        </div>

        <button type="submit" class="btn-primary">Register</button>

        <div class="divider">
          <span>Sign up with social media account</span>
        </div>

        <div class="social-row">
          <button type="button" class="btn-social facebook">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="#1C4A5A">
              <path d="M24 12.073C24 5.404 18.627 0 12 0S0 5.404 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.93-1.956 1.874v2.25h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
            </svg>
            facebook
          </button>
          <button type="button" class="btn-social google">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
              <path fill="#1C4A5A" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#1C4A5A" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#1C4A5A" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
              <path fill="#1C4A5A" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            google
          </button>
        </div>
      </form>

      <!-- Login Form -->
      <form id="form-login" class="auth-form hidden" onsubmit="handleLogin(event)">
        <div class="field">
          <label>Email</label>
          <input type="email" placeholder="abc@gmail.com" />
        </div>

        <div class="field">
          <label>Password</label>
          <input type="password" placeholder="••••••••••••••••" />
        </div>

        <p class="forgot"><a href="#">Forgot password?</a></p>

        <button type="submit" class="btn-primary">Login</button>

        <div class="divider">
          <span>Or login with social media</span>
        </div>

        <div class="social-row">
          <button type="button" class="btn-social facebook">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="#1C4A5A">
              <path d="M24 12.073C24 5.404 18.627 0 12 0S0 5.404 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.93-1.956 1.874v2.25h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
            </svg>
            facebook
          </button>
          <button type="button" class="btn-social google">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
              <path fill="#1C4A5A" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#1C4A5A" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#1C4A5A" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
              <path fill="#1C4A5A" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            google
          </button>
        </div>
      </form>

    </div>
  </div>

  <script src="signup_login.js"></script>
</body>
</html>
